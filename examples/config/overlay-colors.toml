# arcterm config overlay — custom color scheme (Catppuccin Mocha)
#
# This overlay applies the Catppuccin Mocha color palette on top of your
# base config.  Apply it with:
#
#   arcterm config accept overlay-colors
#
# or place it in ~/.config/arcterm/overlays/overlay-colors.toml.

color_scheme = "dark"

[colors]
foreground = "#cdd6f4"
background = "#1e1e2e"
cursor     = "#f5e0dc"

# Standard ANSI palette
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

# Bright variants
bright_black   = "#585b70"
bright_red     = "#f38ba8"
bright_green   = "#a6e3a1"
bright_yellow  = "#f9e2af"
bright_blue    = "#89b4fa"
bright_magenta = "#f5c2e7"
bright_cyan    = "#94e2d5"
bright_white   = "#a6adc8"
