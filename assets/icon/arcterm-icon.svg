<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#011423"/>
      <stop offset="100%" style="stop-color:#0B253A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#47FF9C"/>
      <stop offset="100%" style="stop-color:#1FA8FF"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)" stroke="url(#glow)" stroke-width="2"/>
  <!-- Terminal prompt symbol > -->
  <text x="22" y="78" font-family="Menlo, Monaco, Consolas, monospace" font-size="60" font-weight="bold" fill="url(#glow)">A</text>
  <!-- AI sparkle dots -->
  <circle cx="88" cy="36" r="4" fill="#47FF9C" opacity="0.9"/>
  <circle cx="102" cy="50" r="3" fill="#1FA8FF" opacity="0.8"/>
  <circle cx="94" cy="64" r="2.5" fill="#A277FF" opacity="0.7"/>
  <!-- Cursor blink line -->
  <rect x="82" y="52" width="3" height="30" rx="1.5" fill="#47FF9C" opacity="0.8"/>
</svg>
